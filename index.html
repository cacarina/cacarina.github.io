<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cacarina 的个人博客</title>
    <meta name="description" content="记录学习、生活和技术的个人博客。">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <header class="site-header">
      <a class="site-title" href="./index.html">Cacarina</a>
      <nav class="site-nav" aria-label="主导航">
        <a href="./index.html">首页</a>
        <a href="#posts">文章</a>
        <a href="#about">关于</a>
      </nav>
    </header>

    <main>
      <section class="intro">
        <div>
          <p class="eyebrow">Personal Blog</p>
          <h1>记录我的学习、观察和一点点日常。</h1>
          <p class="intro-text">
            这里会放技术学习笔记、读书记录和生活想法。先从一个简单页面开始，以后可以慢慢升级成更完整的博客。
          </p>
        </div>
        <div class="visual" aria-hidden="true">
          <div class="visual-card">
            <span>01</span>
            <strong>Hello, GitHub Pages</strong>
            <small>第一篇博客已经准备好</small>
          </div>
        </div>
      </section>

      <section id="posts" class="section">
        <div class="section-heading">
          <p class="eyebrow">Posts</p>
          <h2>最新文章</h2>
        </div>

        <div id="post-list" class="post-list" aria-live="polite"></div>
      </section>

      <section id="about" class="section about">
        <div class="section-heading">
          <p class="eyebrow">About</p>
          <h2>关于我</h2>
        </div>
        <p>
          你好，我是 Cacarina。这个博客会用来记录我正在学习的东西，也会保存一些值得反复回看的笔记。
        </p>
      </section>
    </main>

    <footer class="site-footer">
      <span>© 2026 Cacarina</span>
      <span>Built with GitHub Pages</span>
    </footer>
    <script src="./scripts/main.js"></script>
  </body>
</html>
